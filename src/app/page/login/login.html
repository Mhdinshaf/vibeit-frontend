<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-black italic uppercase text-gray-900">Login to <span class="text-blue-600">VibeIt</span></h2>
      <p class="text-gray-400 text-sm mt-2">Enter your details to access your account</p>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-xs font-black uppercase text-gray-500 mb-2">Email Address</label>
        <input type="email" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition" placeholder="example@mail.com">
      </div>
      <div>
        <label class="block text-xs font-black uppercase text-gray-500 mb-2">Password</label>
        <input type="password" class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition" placeholder="••••••••">
      </div>
      <button class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 transition">Sign In</button>
    </form>
  

    <div class="mt-8 text-center">
      <p class="text-sm text-gray-500">Don't have an account? <button class="text-blue-600 font-bold hover:underline" routerLink="/register">Create One</button></p>
      <p class="text-xs text-blue-400 mt-4 font-bold cursor-pointer italic uppercase">Become a Reseller</p>
    </div>
  </div>
</div>
