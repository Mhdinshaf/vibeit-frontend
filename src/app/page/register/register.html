<section class="bg-gray-50 min-h-screen flex flex-col justify-center items-center px-6 py-12">
    <div class="w-full bg-white rounded-[2rem] shadow-xl border border-gray-100 max-w-lg p-8 md:p-12">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter text-gray-900">
                REGISTER TO <span class="text-blue-600">VIBEIT</span>
            </h1>
            <p class="text-gray-400 text-sm mt-2">Enter your details to create an account</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Full Name</label>
                <input type="text" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="Your Full Name">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Email Address</label>
                    <input type="email" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="name@vibeit.com">
                </div>
                <div>
                    <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Phone Number</label>
                    <input type="tel" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="07X XXX XXXX">
                </div>
            </div>

            <div>
                <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Address</label>
                <input type="text" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="Street Address, City">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Postal Code</label>
                    <input type="text" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="10100">
                </div>
                <div>
                    <label class="block mb-1 text-xs font-black text-gray-500 uppercase tracking-wider">Password</label>
                    <input type="password" class="bg-yellow-50 border-none text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block w-full p-4" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full text-white bg-[#111827] hover:bg-black font-black rounded-xl text-lg px-5 py-4 text-center transition-all duration-200 uppercase tracking-widest mt-4">
                Sign Up
            </button>

            <div class="text-center space-y-3 mt-6">
                <p class="text-sm text-gray-500 font-medium">
                    Already have an account? 
                    <a routerLink="/login" class="text-blue-600 font-bold hover:underline cursor-pointer">Login Here</a>
                </p>
                <a href="#" class="text-blue-400 text-xs font-bold italic uppercase tracking-tighter hover:text-blue-600">
                    Terms & Conditions
                </a>
            </div>
        </form>
    </div>
</section>
