<div class="max-w-screen-xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-black italic uppercase mb-10 border-b pb-4">Your Shopping Cart</h1>
  
  <div class="flex flex-col lg:flex-row gap-12">
    <div class="flex-grow space-y-6">
      <div class="flex items-center gap-6 p-6 bg-white border border-gray-100 rounded-3xl shadow-sm">
        <img src="https://m.media-amazon.com/images/I/61f1YfTkTDL._AC_SL1500_.jpg" class="w-24 h-24 object-contain">
        <div class="flex-grow">
          <h3 class="font-bold text-gray-900 text-sm">Anker Soundcore R50i NC</h3>
          <p class="text-xs text-gray-400">Color: Black</p>
          <p class="text-blue-600 font-black mt-2">Rs 6,999.00</p>
        </div>
        <div class="flex border border-gray-100 rounded-full overflow-hidden">
          <button class="px-3 py-1 bg-gray-50 hover:bg-gray-200">-</button>
          <span class="px-4 py-1 text-sm font-bold">1</span>
          <button class="px-3 py-1 bg-gray-50 hover:bg-gray-200">+</button>
        </div>
        <button class="text-gray-300 hover:text-red-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    </div>

    <div class="w-full lg:w-96">
      <div class="bg-gray-900 text-white p-8 rounded-3xl sticky top-24">
        <h3 class="text-xl font-black uppercase italic mb-6">Order Summary</h3>
        <div class="space-y-4 text-sm font-medium border-b border-gray-700 pb-6">
          <div class="flex justify-between"><span>Subtotal</span><span>Rs 6,999.00</span></div>
          <div class="flex justify-between"><span>Shipping</span><span class="text-green-400 font-bold italic">FREE</span></div>
        </div>
        <div class="flex justify-between items-center pt-6 mb-8">
          <span class="text-lg font-black uppercase italic">Total</span>
          <span class="text-2xl font-black">Rs 6,999.00</span>
        </div>
        <button class="w-full bg-blue-600 text-white py-4 rounded-full font-black uppercase tracking-widest hover:bg-blue-700 transition">Checkout Now</button>
      </div>
    </div>
  </div>
</div>
