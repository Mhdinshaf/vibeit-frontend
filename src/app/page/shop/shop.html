<div class="max-w-screen-xl mx-auto px-4 py-10 flex flex-col md:flex-row gap-10">
  
<aside class="w-full md:w-64 flex-shrink-0 bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
  <div class="sticky top-24">
    <h1 class="text-2xl font-[1000] italic uppercase tracking-tighter mb-10">Filters</h1>
    
    <div class="mb-12">
      <h4 class="font-black text-[11px] uppercase tracking-[0.2em] text-gray-900 mb-6 border-b border-gray-100 pb-2">Category</h4>
      
      <div class="relative">
        <select class="w-full bg-gray-50 border border-gray-100 text-gray-600 text-[12px] font-bold rounded-2xl px-4 py-4 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all cursor-pointer uppercase italic">
          <option value="" disabled selected>Select a Category...</option>
          <option value="apple">Apple Store</option>
          <option value="mobile">Mobile Phones</option>
          <option value="smartwatches">Smartwatches</option>
          <option value="audio">Earbuds & Audio</option>
          <option value="powerbanks">Power Banks</option>
          <option value="speakers">Speakers</option>
          <option value="cameras">Cameras</option>
          <option value="accessories">Accessories</option>
          <option value="smartdevices">Smart Devices</option>
        </select>
        
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>
    </div>

    <div class="mb-12">
      <h4 class="font-black text-[11px] uppercase tracking-[0.2em] text-gray-900 mb-6 border-b border-gray-100 pb-2">Price Range</h4>
      <div class="px-2">
        <input type="range" min="0" max="100000" class="w-full h-1.5 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
        <div class="flex justify-between mt-4 text-[10px] font-black text-gray-400 italic">
          <span>Rs 0</span>
          <span>Rs 100,000+</span>
        </div>
      </div>
    </div>

    <div class="mb-10">
      <h4 class="font-black text-[11px] uppercase tracking-[0.2em] text-gray-900 mb-6 border-b border-gray-100 pb-2">Availability</h4>
      
      <div class="relative">
        <select class="w-full bg-gray-50 border border-gray-100 text-gray-600 text-[12px] font-bold rounded-2xl px-4 py-4 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all cursor-pointer uppercase italic">
          <option value="all">Any Availability</option>
          <option value="instock">In Stock</option>
          <option value="outofstock">Out of Stock</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </div>

    <button class="w-full py-4 bg-gray-50 text-[10px] font-[1000] uppercase italic tracking-widest text-gray-400 hover:bg-red-50 hover:text-red-600 transition-all rounded-2xl mt-4">
      Clear All Filters
    </button>
  </div>
</aside>

  <main class="flex-grow">
    <div class="flex justify-between items-center mb-8 bg-gray-50 p-4 rounded-xl">
      <h1 class="font-black text-2xl italic uppercase">All Products <span class="text-xs text-gray-400 ml-2">(1003 Products)</span></h1>
      <select class="bg-white border-none text-xs font-bold rounded-lg focus:ring-0">
        <option>Best Selling</option>
        <option>Price: Low to High</option>
        <option>Price: High to Low</option>
      </select>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="h-96 bg-gray-100 rounded-2xl animate-pulse"></div>
      <div class="h-96 bg-gray-100 rounded-2xl animate-pulse"></div>
      <div class="h-96 bg-gray-100 rounded-2xl animate-pulse"></div>
    </div>
  </main>
</div>
